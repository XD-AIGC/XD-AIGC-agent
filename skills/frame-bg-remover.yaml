name: frame-bg-remover
description: 去除图片背景（抠图/去白底）
api:
  endpoint_path: /api/shared/frame-bg-remover/process
  method: POST
  content_type: multipart/form-data
params:
  - name: image
    type: image
    required: true
    prompt_to_user: "请上传你想去除背景的图片"
output:
  type: image_binary
  display_as: feishu_image
