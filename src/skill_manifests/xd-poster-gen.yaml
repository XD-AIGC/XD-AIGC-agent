# 心动小镇运营海报对话式生成 — harness manifest
#
# 设计原则：
# - 同事维护 skills/xd-poster-gen-skill/SKILL.md 和 references/，我们不动
# - 本 manifest 只描述「harness 怎么调 backend」+「lazy load 哪些资源」
# - skill_md_path 指向的 SKILL.md 会整段加载到 system_prompt_core，作为 Skill Mode 的子 prompt
#
# 端到端流程：
#   用户 →「画一张海报」→ router 选中本 skill → 进 Skill Mode
#   → skill_decide 按 SKILL.md 引导收 brief
#   → 收齐 → action=submit + 完整 payload
#   → executor PollBackend 提交 → 轮询 → 拿 image URL → 下载 → 上传飞书 → 回图

name: xd-poster-gen
description: 心动小镇运营海报对话式生成。9 个 brief 字段（角色/动作/标题/排版/色调/比例等），自动收集并生成。

skill_md_path: skills/xd-poster-gen-skill/SKILL.md

api:
  type: poll
  submit_path: /xd-poster-studio-v2/api/generate-v2
  submit_method: POST
  submit_content_type: application/json
  poll_path_template: /xd-poster-studio-v2/api/poll-v2/{job_id}
  job_id_field: v2JobId
  status_field: status
  done_value: completed
  failed_value: failed
  error_field: error
  result_path: images[0].url
  poll_interval_sec: 3
  poll_timeout_sec: 300

# enum params：harness 在 ask_param 时会自动追加可选值列表到 reply，
# 兜底防 LLM 漏列选项。values 必须与 references/options.md 同步。
# 非 enum 字段（actionDesc / textContent 等自由文本）不在此处声明。
params:
  - name: compositionType
    type: enum
    required: true
    values:
      - default
      - lefttext_rightimg
      - leftimg_righttext
      - toptext_bottomimg
      - topimg_bottomtext
      - center
      - triangle
      - symmetry
      - surround
      - diagonal
      - curve
    prompt_to_user: 排版构图
  - name: ratio
    type: enum
    required: false
    values:
      - "2:3"
      - "9:16"
      - "1:1"
      - "3:2"
      - "16:9"
    prompt_to_user: 比例
  - name: resolution
    type: enum
    required: false
    values:
      - "1K"
      - "2K"
      - "4K"
    prompt_to_user: 清晰度

output:
  type: image_url
  display_as: feishu_image

lazy_resources:
  lookup_characters: xd-poster-gen-skill/references/characters.tsv
  lookup_options: xd-poster-gen-skill/references/options.md
